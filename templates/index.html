<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPI Guardian Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="display-5 fw-bold text-dark">🛡️ RPI-Health & Resource Guardian</h1>
                <p class="text-muted">Monitorizare termică și management de procese în timp real</p>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">Temperatură CPU</h5>
                        <h2 class="display-4 fw-bold text-danger" id="temp-display">-- °C</h2>
                        <div class="progress mt-2" style="height: 10px;">
                            <div id="temp-progress" class="progress-bar bg-danger" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">Utilizare CPU Globală</h5>
                        <h2 class="display-4 fw-bold text-primary" id="cpu-display">-- %</h2>
                        <div class="progress mt-2" style="height: 10px;">
                            <div id="cpu-progress" class="progress-bar bg-primary" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="card-title mb-0 fw-bold">Grafic Evoluție Termică</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="tempChart" style="max-height: 300px;"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="card-title mb-0 fw-bold">Top 5 Procese Active (Filtrare din top)</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>PID</th>
                                        <th>Utilizator</th>
                                        <th>%CPU</th>
                                        <th>%MEM</th>
                                        <th>Comandă</th>
                                    </tr>
                                </thead>
                                <tbody id="process-table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('tempChart').getContext('2d');
        const maxDataPoints = 20;
        
        const tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperatură CPU (°C)',
                    data: [],
                    borderColor: '#dc3545',
                    backgroundColor: 'rgba(220, 53, 69, 0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { min: 20, max: 85 }
                }
            }
        });

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                document.getElementById('temp-display').innerText = data.temperature + " °C";
                document.getElementById('temp-progress').style.width = data.temperature + "%";
                
                document.getElementById('cpu-display').innerText = data.cpu_usage + " %";
                document.getElementById('cpu-progress').style.width = data.cpu_usage + "%";

                const now = new Date().toLocaleTimeString();
                if (tempChart.data.labels.length >= maxDataPoints) {
                    tempChart.data.labels.shift();
                    tempChart.data.datasets[0].data.shift();
                }
                tempChart.data.labels.push(now);
                tempChart.data.datasets[0].data.push(data.temperature);
                tempChart.update('none'); 

                const tableBody = document.getElementById('process-table-body');
                tableBody.innerHTML = '';

                data.processes.forEach(proc => {
                    const row = `
                        <tr>
                            <td><span class="badge bg-secondary">${proc.pid}</span></td>
                            <td>${proc.user}</td>
                            <td class="fw-bold text-primary">${proc.cpu}%</td>
                            <td>${proc.mem}%</td>
                            <td class="text-truncate" style="max-width: 120px;"><code>${proc.command}</code></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error("Eroare la preluarea datelor:", error);
            }
        }

        fetchStats();
        setInterval(fetchStats, 2000);
    </script>
</body>
</html>
